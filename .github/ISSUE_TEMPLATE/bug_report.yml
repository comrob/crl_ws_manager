name: Bug report
description: Report a bug in ws_manager
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a report.

        Please include the output of `ws doctor` and `ws --version`. That usually shortens triage significantly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the exact commands and environment setup needed to reproduce the issue.
      placeholder: |
        1. source /opt/ros/jazzy/setup.bash
        2. source ~/.bashrc
        3. ws which my_pkg my_launch.py
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include the full error output.
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: `ws doctor` output
      render: shell
      description: Paste the full output of `ws doctor`.
    validations:
      required: true
  - type: textarea
    id: version
    attributes:
      label: `ws --version` output
      render: shell
      description: Paste the full output of `ws --version`.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      description: For example Ubuntu 24.04
      placeholder: Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: ros_distro
    attributes:
      label: ROS distro
      description: For example jazzy, humble, iron, rolling
      placeholder: jazzy
    validations:
      required: true
