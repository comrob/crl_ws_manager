name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      ROS_DISTRO: jazzy
      CI_TMP_ROOT: /tmp/ws_manager_ci
      HOME: /tmp/ws_manager_ci/home
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install colcon
        run: |
          python -m pip install --upgrade pip
          # Install system-wide so colcon is on PATH regardless of HOME override.
          sudo python -m pip install colcon-common-extensions

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Prepare mock workspaces
        run: |
          rm -rf "$CI_TMP_ROOT"
          mkdir -p "$HOME"
          mkdir -p "$HOME/ros2_ws/src"
          mkdir -p "$HOME/dev_ws/src"

      - name: Show fixture layout
        run: |
          echo "Fixture root: $CI_TMP_ROOT"
          find "$CI_TMP_ROOT" -maxdepth 3 -type d | sort

      - name: Check shell syntax
        run: |
          bash -n bin/*.sh
          bash -n lib/ws_lib.sh
          bash -n completion/ws_manager.bash
          bash -n install.sh

      - name: Install tool
        run: make install

      - name: Smoke test commands
        shell: bash
        run: |
          source "$HOME/.bashrc"
          ws --version
          ws build --help
          ws-cd-resolve --help
          ws doctor

      - name: Run bats tests
        run: bats tests/bats/*.bats

      - name: Uninstall smoke test
        run: make uninstall
